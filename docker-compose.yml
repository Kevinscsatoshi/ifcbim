# CAD2BIM Studio – full-online with DWG support
# Usage: from project root run  docker compose up -d
# Open http://localhost:8000
# Do not set VERCEL or DWG conversion will be disabled.

services:
  app:
    build: .
    image: cad2bim
    ports:
      - "8000:8000"
    volumes:
      - cad2bim_jobs:/app/data/jobs
    env_file: .env
    environment:
      - CAD2BIM_JOB_DIR=/app/data/jobs
      # Optional if ODA is not on PATH:
      # - ODA_FILE_CONVERTER_PATH=/usr/bin/ODAFileConverter
    restart: unless-stopped

volumes:
  cad2bim_jobs:
